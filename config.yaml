# 智谱 API Key
# 获取地址：https://open.bigmodel.cn/
# 注册后在「API Keys」页面创建并复制
api_key: 0287bd1ea8cb4ac099019c15c78f6d9f.J3r1pC39kMEE9iMx

# 智谱 API 接入地址（无需修改）
base_url: https://open.bigmodel.cn/api/paas/v4

# 模型选择
# glm-4-flash：免费、速度快，适合日常备课
# glm-4：能力更强，消耗更多额度
model: glm-4-flash

# 输出设置
output_dir: .                    # 文件保存目录，. 表示当前目录
temperature: 0.7                 # 0.5=严谨 0.8=有创意
max_tokens: 3072                 # 单次回复最大长度（越大越慢）
max_history: 6                   # 最大历史消息轮数（越多越慢）
