<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备课助手 - 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1e1e2e;
        }
        .subtitle {
            font-size: 14px;
            color: #6c7086;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e3e8;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: #fafafa;
        }
        .form-group input:focus {
            border-color: #7c3aed;
            background: white;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .form-group input::placeholder {
            color: #9ca3af;
        }
        .form-group .hint {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 6px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124,58,237,0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .link-section {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e0e3e8;
        }
        .link-section a {
            color: #7c3aed;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .link-section a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .loading {
            display: inline-flex;
            gap: 3px;
        }
        .loading span {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: dot 1.4s infinite;
        }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%,80%,100%{opacity:0.2;transform:scale(0.7)} 40%{opacity:1;transform:scale(1)} }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo-section">
            <div class="logo">📚</div>
            <div class="title">备课助手</div>
            <div class="subtitle">AI 驱动的智能备课平台</div>
        </div>
        
        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>
        
        <form id="register-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
                <div class="hint">用户名将作为您的登录账号</div>
            </div>
            
            <div class="form-group">
                <label for="email">邮箱（选填）</label>
                <input type="email" id="email" placeholder="请输入邮箱地址">
                <div class="hint">用于找回密码等安全操作</div>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
                <div class="hint">密码长度至少6位</div>
            </div>
            
            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" placeholder="请再次输入密码" required>
            </div>
            
            <button type="submit" class="btn-primary" id="submit-btn">
                <span id="btn-text">注 册</span>
                <span id="btn-loading" class="loading" style="display:none"><span></span><span></span><span></span></span>
            </button>
        </form>
        
        <div class="link-section">
            <span>已有账号？</span>
            <a href="/login">立即登录</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const username = document.getElementById('username');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = username.value.trim();
            const mail = email.value.trim();
            const pass = password.value.trim();
            const confirmPass = confirmPassword.value.trim();
            
            if (!user || !pass || !confirmPass) {
                showError('请填写所有必填项');
                return;
            }
            
            if (pass.length < 6) {
                showError('密码长度至少6位');
                return;
            }
            
            if (pass !== confirmPass) {
                showError('两次输入的密码不一致');
                return;
            }
            
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline-flex';
            hideError();
            hideSuccess();
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email: mail, password: pass })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('注册成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showError(data.error || '注册失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
        
        function hideError() {
            errorMsg.style.display = 'none';
        }
        
        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
        }
        
        function hideSuccess() {
            successMsg.style.display = 'none';
        }
    </script>
</body>
</html>
